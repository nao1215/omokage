version: 2
project_name: omokage
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
builds:
  - main: .
    binary: omokage
    ldflags:
      - -s -w -X github.com/nao1215/omokage/cmd.Version=v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
nfpms:
  - maintainer: 'Naohiro CHIKAMATSU <n.chika156@gmail.com>'
    description: omokage - measure how closely writing matches a learned author's style
    homepage: https://github.com/nao1215/omokage
    license: MIT
    formats:
      - deb
      - rpm
      - apk
