name: Coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1"
          check-latest: true

      - name: Run tests with coverage report output
        run: go test -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...

      - uses: k1LoW/octocov-action@v1
        with:
          config: .octocov.yml
          work-dir: .
          args: --report=coverage.out
